# Sprint 201: Automated daily DB backup
# Closes Audit LOW finding L2 (carried since Sprint 195)
name: Daily DB Backup

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="topranker_backup_${TIMESTAMP}.sql.gz"
          pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "Backup created: $FILENAME ($(du -h "$FILENAME" | cut -f1))"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      - name: Verify backup integrity
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          gunzip -t "$BACKUP_FILE"
          SIZE=$(stat -c%s "$BACKUP_FILE" 2>/dev/null || stat -f%z "$BACKUP_FILE")
          if [ "$SIZE" -lt 1000 ]; then
            echo "WARNING: Backup suspiciously small ($SIZE bytes)"
            exit 1
          fi
          echo "Backup verified: $SIZE bytes"
