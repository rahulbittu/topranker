<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B2D45"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A930"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C54A"/>
      <stop offset="40%" stop-color="#C49A1A"/>
      <stop offset="100%" stop-color="#A07A10"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background with gradient -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle corner accent -->
  <path d="M400,0 L512,0 L512,112 Q512,0 400,0 Z" fill="#C49A1A" opacity="0.08"/>

  <!-- Podium bars with gold gradient and glow -->
  <g filter="url(#shadow)" transform="translate(256, 290)">
    <!-- Left bar (3rd place) -->
    <rect x="-150" y="-20" width="80" height="130" rx="12" fill="url(#goldShine)"/>
    <rect x="-150" y="-20" width="80" height="20" rx="12" fill="#E8C54A" opacity="0.4"/>

    <!-- Center bar (1st place - tallest) -->
    <rect x="-40" y="-130" width="80" height="240" rx="12" fill="url(#goldShine)"/>
    <rect x="-40" y="-130" width="80" height="24" rx="12" fill="#E8C54A" opacity="0.4"/>

    <!-- Right bar (2nd place) -->
    <rect x="70" y="-60" width="80" height="170" rx="12" fill="url(#goldShine)"/>
    <rect x="70" y="-60" width="80" height="20" rx="12" fill="#E8C54A" opacity="0.4"/>
  </g>

  <!-- Crown / star accent above center bar -->
  <g filter="url(#glow)" transform="translate(256, 108)">
    <circle cx="0" cy="0" r="28" fill="url(#gold)"/>
    <circle cx="0" cy="0" r="18" fill="#E8C54A" opacity="0.3"/>
    <!-- Star shape -->
    <polygon points="0,-14 4,-5 14,-5 6,2 9,12 0,6 -9,12 -6,2 -14,-5 -4,-5" fill="#FFF" opacity="0.9"/>
  </g>

  <!-- Rank numbers on bars -->
  <text x="106" y="340" text-anchor="middle" fill="#0D1B2A" font-size="36" font-weight="900" font-family="system-ui, -apple-system, sans-serif" opacity="0.5">3</text>
  <text x="256" y="260" text-anchor="middle" fill="#0D1B2A" font-size="44" font-weight="900" font-family="system-ui, -apple-system, sans-serif" opacity="0.5">1</text>
  <text x="366" y="300" text-anchor="middle" fill="#0D1B2A" font-size="36" font-weight="900" font-family="system-ui, -apple-system, sans-serif" opacity="0.5">2</text>
</svg>
