[build]
builder = "NIXPACKS"
installCommand = "npm install"
buildCommand = "rm -rf dist && cp -r dist-web-backup dist && npm run server:build"

[deploy]
startCommand = "PORT=8080 npm run server:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[service]
internalPort = 8080

[checks.web]
type = "http"
interval = 30000
timeout = 5000
method = "GET"
path = "/_health"
