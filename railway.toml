[build]
builder = "NIXPACKS"
installCommand = "npm install"
buildCommand = "npm run web:build && npm run server:build"

[deploy]
startCommand = "npm run server:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[service]
internalPort = 8080

[checks.web]
type = "http"
interval = 30000
timeout = 5000
method = "GET"
path = "/_health"
