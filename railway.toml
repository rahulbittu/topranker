[build]
builder = "NIXPACKS"
installCommand = "npm install"
buildCommand = "echo 'BUILD_V2_START' && ls -la dist/ && ls -la dist-web-backup/ 2>/dev/null; npm run server:build && echo 'BUILD_V2_DONE'"

[deploy]
startCommand = "PORT=8080 npm run server:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[service]
internalPort = 8080

[checks.web]
type = "http"
interval = 30000
timeout = 5000
method = "GET"
path = "/_health"
